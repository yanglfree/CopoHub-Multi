name: copohub
description: "CopoHub - GitHub client for HarmonyOS & iOS"
publish_to: 'none'
version: 2.0.0+2000000

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # HTTP
  dio: ^5.8.0+1

  # Local Storage
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # QR Code
  qr_flutter: ^4.1.0

  # Markdown & Code Highlight
  flutter_markdown: ^0.7.6+1
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0

  # Image
  cached_network_image: ^3.4.1

  # WebView (OAuth login)
  # Using OpenHarmony-SIG fork which adds ohos platform support.
  # The SIG main package (4.6.0) registers android/ios/ohos and rewires
  # all sub-package dependencies to its own git repo, so we must replace
  # the whole webview dependency tree via dependency_overrides below.
  webview_flutter:
    git:
      url: https://gitee.com/openharmony-sig/flutter_packages.git
      path: packages/webview_flutter/webview_flutter

  # Utilities
  # Flutter 3.32.5 resolves 0.20.2, while Flutter-OH 3.22 resolves 0.19.0.
  intl: '>=0.19.0 <0.21.0'
  url_launcher: ^6.3.1
  share_plus: ^10.1.3
  path_provider: ^2.1.5

# Force all webview sub-packages to use the SIG fork so that version
# resolution is consistent across android / ios / ohos platforms.
# url_launcher_ohos is the HarmonyOS implementation of url_launcher from the
# same SIG fork; it must be declared here so Flutter activates the ohos plugin.
dependency_overrides:
  webview_flutter_android:
    git:
      url: https://gitee.com/openharmony-sig/flutter_packages.git
      path: packages/webview_flutter/webview_flutter_android
  webview_flutter_wkwebview:
    git:
      url: https://gitee.com/openharmony-sig/flutter_packages.git
      path: packages/webview_flutter/webview_flutter_wkwebview
  webview_flutter_platform_interface:
    git:
      url: https://gitee.com/openharmony-sig/flutter_packages.git
      path: packages/webview_flutter/webview_flutter_platform_interface
  url_launcher_ohos:
    git:
      url: https://gitee.com/openharmony-sig/flutter_packages.git
      path: packages/url_launcher/url_launcher_ohos

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/ic_icon.png
